<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PDF Parser | Free Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center py-10">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-2xl">
        <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">📄 AI PDF Parser</h1>
        
        <form action="/upload" method="post" enctype="multipart/form-data" class="space-y-4">
            <input type="file" name="pdf" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 border border-gray-300 p-2 rounded-lg">
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 rounded-lg hover:bg-blue-700 transition">Parse Document</button>
        </form>

        {% if result %}
            <div class="mt-8 border-t pt-6">
                <h2 class="text-lg font-semibold text-gray-700 mb-2">Results: {{ filename }}</h2>
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 h-64 overflow-y-auto whitespace-pre-wrap text-sm text-gray-600 mb-4">{{ result }}</div>
                <a href="/download/{{ filename }}" class="block text-center bg-green-600 text-white font-bold py-2 rounded-lg hover:bg-green-700 transition">Download as JSON</a>
            </div>
        {% endif %}
    </div>
</body>
</html>
